# Game-Servum Commander — Docker Compose Example
#
# Usage:
#   docker compose up -d
#
# Access the Commander at http://localhost:8080
# On first visit, you'll be prompted to set an admin password.
#
# Environment variables:
#   PORT               — Server port (default: 8080)
#   COMMANDER_PASSWORD — Pre-set admin password (optional; if omitted, set via UI on first visit)
#   TRUST_PROXY        — Set to "true" when behind a reverse proxy with TLS (enables secure cookies)
#   DATA_PATH          — Data directory inside container (default: /app/data)
#
# For HTTPS, put a reverse proxy (Traefik, Caddy, nginx) in front.
# See the commented-out Caddy example below.

services:
  commander:
    build: .
    # Or use a pre-built image:
    # image: ghcr.io/xscr33m/game-servum-commander:latest
    ports:
      - "8080:8080"
    volumes:
      - commander-data:/app/data
    environment:
      - PORT=8080
      # - COMMANDER_PASSWORD=changeme # Uncomment to pre-set password
      # - TRUST_PROXY=true               # Uncomment when behind a TLS reverse proxy
    restart: unless-stopped
    init: true # Ensures proper signal forwarding (SIGTERM) for graceful shutdown

  # ── Optional: Caddy reverse proxy for automatic HTTPS ──
  # Uncomment the following to add TLS termination via Caddy.
  # Replace "commander.example.com" with your domain.
  #
  # caddy:
  #   image: caddy:2-alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - caddy-data:/data
  #     - caddy-config:/config
  #   command: caddy reverse-proxy --from commander.example.com --to commander:8080
  #   depends_on:
  #     - commander

volumes:
  commander-data:
  # caddy-data:
  # caddy-config:
